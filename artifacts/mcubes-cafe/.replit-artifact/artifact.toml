kind = "web"
previewPath = "/"
title = "MCubes Cafe"
version = "1.0.0"
id = "artifacts/mcubes-cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23398

[services.development]
run = "pnpm --filter @workspace/mcubes-cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mcubes-cafe", "run", "build" ]
publicDir = "artifacts/mcubes-cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23398"
BASE_PATH = "/"
